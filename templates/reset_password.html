{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <div class="absolute inset-0 bg-gray-50 z-0">
        <div class="absolute top-0 left-0 w-full h-full opacity-5" style="background-image: radial-gradient(#413D3A 1px, transparent 1px); background-size: 20px 20px;"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 md:p-10 relative z-10 border border-gray-100">
        <div class="text-center mb-8">
            <div class="bg-brand-gold w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg rotate-3 transform hover:rotate-0 transition-all">
                <i class="fas fa-key text-2xl text-brand-dark"></i>
            </div>
            <h3 class="text-2xl font-extrabold text-brand-dark">Criar Nova Senha</h3>
            <p class="text-gray-500 mt-2 text-sm leading-relaxed">
                Insira sua nova senha abaixo garantindo que ela atenda aos critérios de segurança.
            </p>
        </div>

        <form action="{{ url_for('reset_password', token=token) }}" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Nova Senha</label>
                <div class="relative">
                    <input type="password" name="password" id="newPass" required placeholder="Sua nova senha" class="w-full px-4 py-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-brand-gold focus:border-transparent outline-none transition-all pr-10 shadow-sm font-medium">
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                        <i class="fas fa-eye password-toggle text-gray-400 hover:text-brand-dark transition-colors" id="iconNewPass" onclick="togglePassword('newPass', 'iconNewPass')"></i>
                    </div>
                </div>

                <div class="mt-4 bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <ul class="text-xs space-y-2.5 text-gray-500 font-semibold" id="password-criteria">
                        <li id="crit-length" class="flex items-center gap-2 transition-all"><i class="fas fa-circle text-[8px] text-gray-300 transition-colors"></i> Mínimo de 8 caracteres</li>
                        <li id="crit-upper" class="flex items-center gap-2 transition-all"><i class="fas fa-circle text-[8px] text-gray-300 transition-colors"></i> Pelo menos uma letra maiúscula</li>
                        <li id="crit-number" class="flex items-center gap-2 transition-all"><i class="fas fa-circle text-[8px] text-gray-300 transition-colors"></i> Pelo menos um número</li>
                    </ul>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Confirmar Nova Senha</label>
                <div class="relative">
                    <input type="password" name="confirm_password" id="newConfirmPass" required placeholder="Repita a nova senha" class="w-full px-4 py-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-brand-gold focus:border-transparent outline-none transition-all pr-10 shadow-sm font-medium">
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                        <i class="fas fa-eye password-toggle text-gray-400 hover:text-brand-dark transition-colors" id="iconNewConfirmPass" onclick="togglePassword('newConfirmPass', 'iconNewConfirmPass')"></i>
                    </div>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-xl text-brand-dark bg-brand-gold hover:bg-yellow-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-gold shadow-lg shadow-yellow-100 hover:shadow-xl transition-all transform hover:-translate-y-1">
                Salvar Nova Senha <i class="fas fa-check ml-2 mt-0.5"></i>
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const passInput = document.getElementById('newPass');

        passInput.addEventListener('input', function(e) {
            const p = e.target.value;

            const setValid = (id, valid) => {
                const el = document.getElementById(id);
                const icon = el.querySelector('i');
                if(valid) {
                    el.classList.add('text-green-600');
                    el.classList.remove('text-gray-500');
                    icon.classList.remove('fa-circle', 'text-gray-300');
                    icon.classList.add('fa-check-circle', 'text-green-600', 'text-xs');
                } else {
                    el.classList.remove('text-green-600');
                    el.classList.add('text-gray-500');
                    icon.classList.add('fa-circle', 'text-gray-300');
                    icon.classList.remove('fa-check-circle', 'text-green-600', 'text-xs');
                }
            };

            setValid('crit-length', p.length >= 8);
            setValid('crit-upper', /[A-Z]/.test(p));
            setValid('crit-number', /\d/.test(p));
        });
    });
</script>
{% endblock %}
